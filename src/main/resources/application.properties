# Puerto de la aplicacion
server.port=8080

##
## MYSQL - FASE 1
##
# Propiedades de conexion
spring.datasource.url=jdbc:mysql://localhost:3306/cardpurchases?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=carduser
spring.datasource.password=cardpass
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Define como Hibernate manipulara el esquema de base de datos al inicio
spring.jpa.hibernate.ddl-auto=update
# none -> No manipula la base de datos (ideal para produccion)
# create -> Elimina y crea el esquema.
# create-drop -> Crea el esquema y lo destruye al cerrar la app (ideal para pruebas)
# validate -> Comprueba si el esquema coincide, caso contrario falla
# update -> Actualiza el esquema sin destruir datos

# Mostrar en la consola todas las SQL que se ejecutan
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

