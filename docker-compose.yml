services:
  db:
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: cardpurchases
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://db:27017/cardpurchases
      SPRING_DATA_MONGODB_DATABASE: cardpurchases

volumes:
  mongodb_data:
